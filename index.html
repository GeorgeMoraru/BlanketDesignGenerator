<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1c2541">
    <title>Blanket Design Generator</title>
    
    <!-- PWA Manifest & App Info -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="apple-touch-icon" href="icons/icon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets & Scripts -->
    <link rel="stylesheet" href="css/app.css">
    <script src="js/app.js" defer></script>
</head>
<body>
    <header class="app-navbar">
        <div class="navbar-brand">
            <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            <span class="navbar-title">Blanket Designer</span>
        </div>
        <button id="menu-toggle-btn" class="navbar-toggle-btn" aria-label="Open settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </header>

    <main class="wrapper">
        <aside class="settings-container">
            <header class="app-header">
                <div class="header-main-row">
                    <button id="menu-close-btn" class="menu-close-btn" aria-label="Close settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <h1>Blanket Designer</h1>
                    <div style="width: 28px;"></div> <!-- Spacer to center title -->
                </div>
                <p>Configure and generate patchwork layouts</p>
            </header>

            <div id="settings-card" class="panel-card">
                <div class="setting-group">
                    <label for="rows">Blanket size</label>
                    <div class="size-inputs">
                        <input type="number" id="rows" min="1" max="100" value="8" />
                        <span class="x-divider">×</span>
                        <input type="number" id="columns" min="1" max="100" value="8" />
                    </div>
                </div>

                <div class="patterns-title-row">
                    <h2>Color Patterns</h2>
                    <span class="total-cells-badge" id="cell-count-badge">64 cells</span>
                </div>

                <!-- Patterns list will be injected here by JS -->
                <div id="patterns-list"></div>

                <button id="add-pattern-btn" class="btn btn-secondary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Pattern
                </button>
            </div>  

            <button id="generate-btn" class="btn btn-primary">
                Generate Design
            </button>

            <!-- GitHub Cloud Sync Settings -->
            <div id="sync-card" class="panel-card">
                <div class="card-header-row">
                    <h2>GitHub Database Sync</h2>
                </div>
                <div class="setting-group">
                    <label for="github-pat">Personal Access Token (PAT)</label>
                    <input type="password" id="github-pat" placeholder="ghp_..." />
                </div>
                <div class="setting-group">
                    <label for="github-repo">Repository (owner/name)</label>
                    <input type="text" id="github-repo" placeholder="owner/repo" />
                </div>
                <button id="save-sync-btn" class="btn btn-secondary">
                    Save Sync Settings
                </button>
            </div>

            <!-- Design History list -->
            <div id="history-card" class="panel-card">
                <div class="card-header-row">
                    <h2>Design History</h2>
                    <span class="total-cells-badge" id="history-count-badge">0 saved</span>
                </div>
                <div id="history-list" class="history-list">
                    <div class="history-empty-state">No designs saved yet.</div>
                </div>
            </div>
        </aside>

        <section class="blanket-canvas">
            <div id="blanket-container" class="canvas-inner">
                <div class="welcome-placeholder">
                    <h2>Your blanket design will appear here</h2>
                    <p>Configure size and patterns, then click "Generate Design"</p>
                </div>
            </div>
            <!-- Floating action button to download canvas as image -->
            <button id="download-image-btn" class="fab-btn" title="Download Design as Image">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </section>
    </main>

    <!-- Overlay menu backdrop -->
    <div id="menu-overlay" class="menu-overlay"></div>
</body>
</html>
