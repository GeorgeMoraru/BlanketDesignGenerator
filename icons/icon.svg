<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rounded deep slate background -->
  <rect width="512" height="512" rx="120" fill="#0b132b" />
  
  <!-- Outer glowing ring border -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="#1c2541" stroke-width="12" />
  <rect x="36" y="36" width="440" height="440" rx="84" fill="none" stroke="#3a506b" stroke-width="2" stroke-dasharray="8 6" />

  <!-- 2x2 patchwork blanket display inside -->
  <g transform="translate(64, 64)">
    <!-- Top-Left Granny Square (Classic Concentric Style) -->
    <g transform="translate(0, 0)">
      <rect width="180" height="180" rx="24" fill="#3a506b" />
      <rect x="20" y="20" width="140" height="140" rx="18" fill="#5bc0be" />
      <rect x="40" y="40" width="100" height="100" rx="12" fill="#ffffff" />
      <circle cx="90" cy="90" r="24" fill="#ffb703" />
    </g>

    <!-- Top-Right Granny Square (Flower Style) -->
    <g transform="translate(204, 0)">
      <rect width="180" height="180" rx="24" fill="#ffb703" />
      <!-- Radial flower design -->
      <circle cx="90" cy="90" r="55" fill="#ffffff" />
      <circle cx="90" cy="90" r="30" fill="#3a506b" />
      <!-- Petals around center -->
      <circle cx="90" cy="50" r="15" fill="#5bc0be" />
      <circle cx="90" cy="130" r="15" fill="#5bc0be" />
      <circle cx="50" cy="90" r="15" fill="#5bc0be" />
      <circle cx="130" cy="90" r="15" fill="#5bc0be" />
    </g>

    <!-- Bottom-Left Granny Square (Mitered L-Shape) -->
    <g transform="translate(0, 204)">
      <rect width="180" height="180" rx="24" fill="#5bc0be" />
      <!-- Mitered layers using layered paths -->
      <path d="M 0,0 L 180,0 L 180,180 L 140,180 L 140,40 L 0,40 Z" fill="#3a506b" />
      <path d="M 0,40 L 140,40 L 140,140 L 100,140 L 100,80 L 0,80 Z" fill="#ffb703" />
      <rect x="0" y="80" width="100" height="100" rx="6" fill="#ffffff" />
    </g>

    <!-- Bottom-Right Granny Square (Diamond Quad Style) -->
    <g transform="translate(204, 204)">
      <rect width="180" height="180" rx="24" fill="#ffffff" />
      <!-- Diagonal divisions -->
      <path d="M 0,0 L 90,90 L 180,0 Z" fill="#5bc0be" />
      <path d="M 180,0 L 90,90 L 180,180 Z" fill="#3a506b" />
      <path d="M 180,180 L 90,90 L 0,180 Z" fill="#ffb703" />
      <path d="M 0,180 L 90,90 L 0,0 Z" fill="#0b132b" />
    </g>
  </g>
</svg>
